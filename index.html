<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHOULCREST — Countdown</title>
  <style>
    :root {
      --bg: #020407;
      --text: #edf7ff;
      --muted: #89a1bb;
      --blue: #17c9ff;
      --blue3: #7feeff;
      --line: rgba(104, 220, 255, 0.16);
      --shadow: 0 0 30px rgba(23, 201, 255, 0.18);
      --shadow-strong: 0 0 55px rgba(23, 201, 255, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(23, 201, 255, 0.12), transparent 18%),
        radial-gradient(circle at 50% 48%, rgba(23, 201, 255, 0.05), transparent 28%),
        linear-gradient(180deg, #010307 0%, #030914 45%, #010307 100%);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.22;
      mask-image: radial-gradient(circle at center, black 38%, transparent 90%);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.08;
      z-index: 0;
    }

    .ambient-fog {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .fog {
      position: absolute;
      width: 44vw;
      height: 44vw;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.13;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .fog.one {
      top: 8%;
      left: -10%;
      background: rgba(23, 201, 255, 0.18);
    }

    .fog.two {
      bottom: -10%;
      right: -8%;
      background: rgba(23, 201, 255, 0.14);
      animation-duration: 18s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(40px, -20px) scale(1.12);
      }
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 20px 0 18px;
    }

    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: rgba(6, 12, 22, 0.52);
      color: var(--blue3);
      padding: 12px 16px;
      border-radius: 999px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .mini-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 12px var(--blue);
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 0 40px;
    }

    .hero-inner {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .title-wrap {
      margin-bottom: 22px;
    }

    .album-title {
      display: inline-block;
      position: relative;
      font-size: clamp(3.8rem, 10vw, 8.6rem);
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      padding: 0.05em 0.12em 0.1em;
      background: linear-gradient(
        180deg,
        #ecfeff 0%,
        #d4fbff 20%,
        #aef3ff 45%,
        #79e7ff 72%,
        #45d8ff 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 6px rgba(255,255,255,0.96);
      filter:
        drop-shadow(0 8px 0 rgba(0,0,0,0.98))
        drop-shadow(0 0 26px rgba(23, 201, 255, 0.2));
    }

    .album-title::before {
      content: "GHOULCREST";
      position: absolute;
      inset: 0;
      z-index: -1;
      color: rgba(0,0,0,0.98);
      -webkit-text-fill-color: rgba(0,0,0,0.98);
      -webkit-text-stroke: 18px rgba(0,0,0,0.98);
      transform: translate(0.045em, 0.085em);
    }

    .album-title::after {
      content: "GHOULCREST";
      position: absolute;
      inset: 0;
      z-index: -2;
      color: rgba(255,255,255,0.95);
      -webkit-text-fill-color: rgba(255,255,255,0.95);
      -webkit-text-stroke: 8px rgba(255,255,255,0.95);
      transform: translate(0.01em, 0.01em);
      opacity: 0.95;
    }

    .subtext {
      max-width: 760px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .release-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(5, 11, 19, 0.6);
      color: var(--blue3);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.8rem;
      margin-bottom: 26px;
      box-shadow: var(--shadow);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 0 auto 22px;
      max-width: 760px;
    }

    .time-box {
      position: relative;
      padding: 22px 14px;
      text-align: center;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(10, 18, 31, 0.94), rgba(4, 8, 15, 0.94)),
        radial-gradient(circle at 50% 0%, rgba(23, 201, 255, 0.09), transparent 38%);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .time-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(128, 239, 255, 0.06), transparent 50%);
      pointer-events: none;
    }

    .time-value {
      font-size: clamp(1.9rem, 4vw, 3.3rem);
      line-height: 1;
      font-weight: 900;
      color: var(--blue3);
      text-shadow: 0 0 18px rgba(127, 238, 255, 0.24);
      margin-bottom: 8px;
    }

    .time-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .status {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(7, 14, 24, 0.64);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.82rem;
      box-shadow: var(--shadow);
    }

    .listen-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 240px;
      padding: 16px 22px;
      border-radius: 999px;
      border: 1px solid rgba(104, 220, 255, 0.22);
      background: linear-gradient(180deg, rgba(18, 36, 58, 0.95), rgba(7, 14, 24, 0.95));
      color: #dffbff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.82rem;
      box-shadow: 0 0 28px rgba(23, 201, 255, 0.2);
      transition: 0.25s ease;
    }

    .listen-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.7);
      color: #ffffff;
      box-shadow: 0 0 36px rgba(23, 201, 255, 0.3);
    }

    .footer-note {
      text-align: center;
      padding: 20px 0 28px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
      position: relative;
      z-index: 2;
    }

    @media (max-width: 700px) {
      .page {
        width: min(1100px, calc(100% - 20px));
      }

      .topbar {
        flex-direction: column;
        padding-top: 14px;
      }

      .countdown {
        grid-template-columns: 1fr 1fr;
      }

      .album-title {
        font-size: clamp(2.8rem, 14vw, 4.8rem);
        -webkit-text-stroke: 3px rgba(255,255,255,0.95);
      }

      .album-title::before {
        -webkit-text-stroke: 10px rgba(0,0,0,0.98);
      }

      .album-title::after {
        -webkit-text-stroke: 4px rgba(255,255,255,0.95);
      }

      .subtext {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-fog">
    <div class="fog one"></div>
    <div class="fog two"></div>
  </div>

  <div class="page">
    <div class="topbar">
      <div class="mini-pill">
        <span class="mini-dot"></span>
        <span>Signal Online</span>
      </div>
      <div class="mini-pill">5 APR / 5PM SGT</div>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <div class="title-wrap">
          <div class="album-title">GHOULCREST</div>
        </div>

        <p class="subtext">
          GHOUL FIT, GHOULED OUT, BAD AIM, FT. CENTRAL CEE, LAST CALL
        </p>

        <div class="release-line">
          Releasing today 5:00 PM SGT
        </div>

        <div class="countdown" id="countdown">
          <div class="time-box">
            <div class="time-value" id="days">00</div>
            <div class="time-label">Days</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="hours">00</div>
            <div class="time-label">Hours</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="minutes">00</div>
            <div class="time-label">Minutes</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="seconds">00</div>
            <div class="time-label">Seconds</div>
          </div>
        </div>

        <div id="releaseArea">
          <div class="status" id="status">
            Awaiting release...
          </div>
        </div>
      </div>
    </section>

    <div class="footer-note">
      I am a gamer who likes games
    </div>
  </div>

  <script>
    const releaseDate = new Date("2026-04-05T17:00:00+08:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const releaseAreaEl = document.getElementById("releaseArea");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function setReleasedState() {
      daysEl.textContent = "00";
      hoursEl.textContent = "00";
      minutesEl.textContent = "00";
      secondsEl.textContent = "00";

      releaseAreaEl.innerHTML = `
        <a
          class="listen-btn"
          href="https://soundcloud.com/ghoulcrest/sets/ghoulcrest-album"
          target="_blank"
          rel="noopener noreferrer"
        >
          Listen Now
        </a>
      `;
    }

    function updateCountdown() {
      const now = Date.now();
      const distance = releaseDate - now;

      if (distance <= 0) {
        setReleasedState();
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
